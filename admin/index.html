<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Élégance Menuiseries</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen" class="login">
    <div class="login__card">
      <h1 class="login__title">Élégance Menuiseries</h1>
      <p class="login__subtitle">Espace d'administration</p>
      <form id="login-form" class="login__form">
        <input type="password" id="login-password" class="login__input" placeholder="Mot de passe" autocomplete="current-password" required>
        <button type="submit" class="login__btn">Se connecter</button>
        <p id="login-error" class="login__error" hidden>Mot de passe incorrect</p>
      </form>
    </div>
  </div>

  <script>
    const API = '/api';

    async function api(endpoint, options = {}) {
      const res = await fetch(`${API}/${endpoint}`, options);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erreur serveur');
      return data;
    }

    // Si déjà connecté, rediriger vers le dashboard
    (async () => {
      try {
        const res = await api('auth.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'status' })
        });
        if (res.authenticated) {
          window.location.href = 'dashboard.html';
        }
      } catch (e) {}
    })();

    // Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');
      errorEl.hidden = true;

      try {
        await api('auth.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'login', password })
        });
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorEl.hidden = false;
      }
    });
  </script>

</body>
</html>
